spring.application.name=bluesphere

# Active Profile
spring.profiles.active=dev

# Database Configuration (H2 for development)
spring.datasource.url=jdbc:h2:mem:bluesphere
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (accessible at http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Scheduling
spring.task.scheduling.pool.size=5

# Weather API Configuration (OpenWeatherMap - Free Tier)
weather.api.key=${OPENWEATHER_API_KEY:demo_key}
weather.api.base-url=https://api.openweathermap.org/data/2.5
weather.ingestion.cron=0 0 */6 * * *

# Logging
logging.level.com.bluesphere=DEBUG
logging.level.org.springframework.web=INFO

# Server Configuration
server.port=8080
